<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Overview | NLDM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --gray: #64748b;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: var(--white);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 70% 50%, rgba(34,197,94,0.07) 0%, transparent 55%);
            z-index: -1;
            pointer-events: none;
        }

        header {
            padding: 1.5rem 2.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .back-link {
            color: var(--gray);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--white); }

        .header-divider { color: rgba(255,255,255,0.15); }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--white);
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text { font-weight: 700; font-size: 1rem; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2.5rem;
            text-align: center;
        }

        .placeholder-icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            line-height: 1;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4vw, 2.75rem);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        h1 span {
            background: linear-gradient(135deg, #22c55e, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            color: var(--gray);
            font-size: 1.05rem;
            max-width: 480px;
            margin: 0 auto 2.5rem;
        }

        .pill {
            display: inline-block;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            color: #22c55e;
            padding: 0.45rem 1.1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.4rem;
            background: var(--dark-light);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--white);
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .back-btn:hover { border-color: rgba(99,102,241,0.4); background: rgba(99,102,241,0.08); }

        footer {
            border-top: 1px solid rgba(255,255,255,0.07);
            padding: 2rem 2.5rem;
            text-align: center;
            color: var(--gray);
            font-size: 0.85rem;
        }

        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>

<body>

    <header>
        <a href="index.html" class="back-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Back
        </a>
        <span class="header-divider">/</span>
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M12 2a9 9 0 0 1 9 9c0 3.6-3.4 6.2-5.5 8.5-1.1 1.2-2.3 2.5-3.5 2.5s-2.4-1.3-3.5-2.5C6.4 17.2 3 14.6 3 11a9 9 0 0 1 9-9z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
            </div>
            <span class="logo-text">NLDM</span>
        </a>
    </header>

    <main>
        <div class="placeholder-icon">&#128193;</div>
        <div class="pill">Coming Soon</div>
        <h1>Course <span>Overview</span></h1>
        <p>The syllabus, lecture schedule, grading policy, and course information will be available here at the start of term.</p>
        <a href="index.html" class="back-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Back to home
        </a>
    </main>

    <footer>
        <a href="index.html">&larr; Back to NLDM</a>
    </footer>

</body>
</html>
