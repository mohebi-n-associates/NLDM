<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Overview | NLDM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:         #f7f4ef;
            --bg-card:    #ffffff;
            --bg-muted:   #f0ece4;
            --border:     #e2ddd5;
            --ink:        #1c1917;
            --ink-light:  #57534e;
            --ink-faint:  #a8a29e;
            --teal:       #0d9488;
            --teal-soft:  rgba(13,148,136,0.1);
            --amber:      #b45309;
            --amber-soft: rgba(180,83,9,0.1);
            --violet:     #6d28d9;
            --violet-soft:rgba(109,40,217,0.1);
            --green:      #15803d;
            --green-soft: rgba(21,128,61,0.1);
            --shadow-sm:  0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md:  0 4px 16px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.06);
            --shadow-lg:  0 12px 32px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.07);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.6;
        }

        header {
            padding: 1.25rem 2.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            max-width: 1100px;
            margin: 0 auto;
            border-bottom: 1px solid var(--border);
        }

        .back-link {
            color: var(--ink-light);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--ink); }

        .header-divider { color: var(--border); }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--ink);
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--ink);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text { font-weight: 700; font-size: 1rem; color: var(--ink); }

        .page-header {
            max-width: 1100px;
            margin: 3rem auto 0;
            padding: 0 2.5rem 2.5rem;
        }

        .page-header h1 {
            font-family: 'Lora', Georgia, serif;
            font-size: clamp(2rem, 4vw, 2.75rem);
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--ink);
        }

        .page-header p {
            color: var(--ink-light);
            font-size: 1.05rem;
            max-width: 600px;
        }

        .page-tag {
            display: inline-block;
            padding: 0.35rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 1.25rem;
        }

        .content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2.5rem 6rem;
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 1.75rem 2.5rem;
            text-align: center;
            color: var(--ink-faint);
            font-size: 0.82rem;
            background: var(--bg-card);
        }

        footer a { color: var(--ink-light); text-decoration: none; }
        footer a:hover { color: var(--ink); text-decoration: underline; }

        body { min-height: 100vh; display: flex; flex-direction: column; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2.5rem;
            text-align: center;
        }

        .placeholder-icon { font-size: 3.5rem; margin-bottom: 1.5rem; line-height: 1; }

        h1 {
            font-family: 'Lora', Georgia, serif;
            font-size: clamp(2rem, 4vw, 2.75rem);
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--ink);
        }

        h1 em { font-style: italic; color: var(--green); }

        .main-p {
            color: var(--ink-light);
            font-size: 1.05rem;
            max-width: 480px;
            margin: 0 auto 2.5rem;
        }

        .pill {
            display: inline-block;
            background: var(--green-soft);
            border: 1px solid rgba(21,128,61,0.2);
            color: var(--green);
            padding: 0.45rem 1.1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.4rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--ink-light);
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }

        .back-btn:hover { border-color: var(--green); color: var(--ink); box-shadow: var(--shadow-md); }
    

        /* ── Light mode explicit (belt-and-suspenders over :root defaults) ── */
        [data-theme="light"] {
            --bg:         #f7f4ef;
            --bg-card:    #ffffff;
            --bg-muted:   #f0ece4;
            --border:     #e2ddd5;
            --ink:        #1c1917;
            --ink-light:  #44403c;
            --ink-faint:  #78716c;
            --teal:       #0d9488;
            --teal-soft:  rgba(13,148,136,0.1);
            --amber:      #b45309;
            --amber-soft: rgba(180,83,9,0.1);
            --violet:     #6d28d9;
            --violet-soft:rgba(109,40,217,0.1);
            --green:      #15803d;
            --green-soft: rgba(21,128,61,0.1);
            --shadow-sm:  0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md:  0 4px 16px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.06);
            --shadow-lg:  0 12px 32px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.07);
        }
        [data-theme="light"] body { background: #f7f4ef; color: #1c1917; }
        [data-theme="light"] .logo-icon { background: #1c1917; }
        [data-theme="light"] header { background: #f7f4ef; border-bottom-color: #e2ddd5; }
        [data-theme="light"] footer { background: #ffffff; border-top-color: #e2ddd5; color: #78716c; }
        [data-theme="light"] footer a { color: #44403c; }

        /* ── Dark mode overrides ── */
        [data-theme="dark"] {
            --bg:         #1c1917;
            --bg-card:    #292524;
            --bg-muted:   #231f1c;
            --border:     #3c3632;
            --ink:        #fafaf9;
            --ink-light:  #d6d3d1;
            --ink-faint:  #78716c;
            --teal:       #2dd4bf;
            --teal-soft:  rgba(45,212,191,0.12);
            --amber:      #fbbf24;
            --amber-soft: rgba(251,191,36,0.12);
            --violet:     #a78bfa;
            --violet-soft:rgba(167,139,250,0.12);
            --green:      #4ade80;
            --green-soft: rgba(74,222,128,0.12);
            --shadow-sm:  0 1px 3px rgba(0,0,0,0.4);
            --shadow-md:  0 4px 16px rgba(0,0,0,0.5);
            --shadow-lg:  0 16px 40px rgba(0,0,0,0.6);
        }
        [data-theme="dark"] .logo-icon { background: #e7e5e4; }
        [data-theme="dark"] .logo-icon svg { stroke: #1c1917 !important; }

        /* ── Theme toggle button ── */
        #theme-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--ink-light);
            width: 34px; height: 34px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 0;
            transition: background 0.2s, color 0.2s;
        }
        #theme-toggle:hover { background: var(--bg-muted); color: var(--ink); }

    </style>
    <script src="theme.js"></script>
  <script src="analytics.js"></script>
</head>
<body>

    <header>
        <a href="index.html" class="back-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Back
        </a>
        <span class="header-divider">/</span>
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M12 2a9 9 0 0 1 9 9c0 3.6-3.4 6.2-5.5 8.5-1.1 1.2-2.3 2.5-3.5 2.5s-2.4-1.3-3.5-2.5C6.4 17.2 3 14.6 3 11a9 9 0 0 1 9-9z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
            </div>
            <span class="logo-text">NLDM</span>
        </a>
            <button id="theme-toggle" onclick="__toggleTheme()" aria-label="Toggle theme" style="margin-left:auto"></button>
    </header>

    <main>
        <div class="placeholder-icon">&#128193;</div>
        <div class="pill">Coming Soon</div>
        <h1>Course <em>Overview</em></h1>
        <p class="main-p">The syllabus, lecture schedule, grading policy, and course information will be available here at the start of term.</p>
        <a href="index.html" class="back-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Back to home
        </a>
    </main>

    <footer>
        <a href="index.html">&larr; Back to NLDM</a> &nbsp;&middot;&nbsp;
        <a href="https://github.com/mohebi-n-associates/NLDM" target="_blank">GitHub</a>
    </footer>

</body>
</html>
